<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body{
            background:black;
        }
        .navbar{
            background-color: rgb(179, 211, 211);
            width: 100%;
            height: 20px;
            border-radius: 10px;
        }
        ul{
            list-style: none;
            display: flex;
            justify-content:space-around;
            flex-wrap: wrap;
        }
        .hero{
            display: flex;
            color: white;
            font-weight: 600px;
            height:600px;
            width: 100%;
            flex-direction: column;
           justify-content: center;
           align-items: center;
           text-align: center;
        }
        main{
            position: relative;
        }
        .chatbot{
            position: absolute;
            bottom: 10px;
            padding-left: 1200px;
        }
    

    </style>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li>Home</li>
            <li>Blog</li>
            <li>About</li>
            <li>contact</li>
            <li>Explore</li>
            <li></li>
        </ul>
    </nav>
    <div class="main"></div>
    <div class="hero">
    <h1>Welcome to website</h1>
    <span>These are the description</span>
    </div>
        <div class="chatbot">💬</div>
    </div>

</body>
</html>
